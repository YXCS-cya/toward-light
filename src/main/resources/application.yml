server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: emotion-narrative-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/emotion_narrative?useSSL=false&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate   # ?2??????????????JPA???
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: info
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

app:
  jwt:
    secret: "change-me-to-a-long-random-string-at-least-32-chars"
    expire-minutes: 120
